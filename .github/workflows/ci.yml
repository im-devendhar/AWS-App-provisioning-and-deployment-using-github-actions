name: Build & Deploy (self-hosted EC2)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CONTAINER_NAME: myapp

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
      tag:   ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - id: meta
        name: Set image meta
        run: |
          echo "image=${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build & Push (SHA only)
        run: |
          IMAGE="${ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}"
          TAG="${GITHUB_SHA::7}"
          docker build -t "$IMAGE:$TAG" app
          docker push "$IMAGE:$TAG"

  deploy:
    needs: build
    # This runs on your EC2 self-hosted runner
    runs-on: self-hosted

    env:
      IMAGE: ${{ needs.build.outputs.image }}
      TAG:   ${{ needs.build.outputs.tag }}

    steps:
      - name: Login to ECR (via EC2 instance profile)
        run: |
          REGISTRY="${IMAGE%/*}"
          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$REGISTRY"

      - name: Pull & Run
        run: |
          set -euxo pipefail
          CN="${{ env.CONTAINER_NAME }}"
          IMAGE="${{ env.IMAGE }}:${{ env.TAG }}"

          docker rm -f "$CN" || true
          docker pull "$IMAGE"

          # Nginx listens on 80 inside the container
          # Public EC2 SG should allow inbound 80
          docker run -d --name "$CN" --restart unless-stopped -p 80:80 "$IMAGE"

      - name: Show container
        run: docker ps --format 'table {{.Names}}\t{{.Image}}\t{{.Ports}}\t{{.Status}}'
