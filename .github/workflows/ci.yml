name: Build & Deploy (self-hosted EC2)

on:
push:
branches: [main]
workflow_dispatch:

permissions:
id-token: write
contents: read

env:
AWS_REGION: ${{ secrets.AWS_REGION }}
ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
CONTAINER_NAME: myapp

jobs:
build-and-deploy:
runs-on: self-hosted

```
steps:
  - name: Checkout Code
    uses: actions/checkout@v4

  - name: Ensure AWS CLI v2 is installed
    shell: bash
    run: |
      set -euxo pipefail
      if ! command -v aws >/dev/null 2>&1; then
        curl -sSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o awscliv2.zip
        unzip -q awscliv2.zip
        sudo ./aws/install || sudo ./aws/install --update
        rm -rf aws awscliv2.zip
      fi
      aws --version

  - name: Ensure Docker is installed & running (Ubuntu)
    shell: bash
    run: |
      set -euxo pipefail

      if ! command -v docker >/dev/null 2>&1; then
        sudo apt-get update -y
        sudo apt-get install -y docker.io
      fi

      sudo systemctl enable --now docker
      sudo usermod -aG docker $USER || true

      sudo docker ps

  - name: Configure AWS credentials (OIDC)
    uses: aws-actions/configure-aws-credentials@v4
    with:
      role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-role
      aws-region: ${{ env.AWS_REGION }}

  - name: Login to ECR
    shell: bash
    run: |
      set -euo pipefail
      REGISTRY="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"

      aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
      | sudo docker login --username AWS --password-stdin "$REGISTRY"

  - name: Build Docker Image
    shell: bash
    run: |
      set -euo pipefail
      REGISTRY="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
      IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

      sudo docker build -t "$IMAGE" .

  - name: Push Image to ECR
    shell: bash
    run: |
      set -euo pipefail
      REGISTRY="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
      IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

      sudo docker push "$IMAGE"

  - name: Deploy Container
    shell: bash
    run: |
      set -euo pipefail
      REGISTRY="${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
      IMAGE="$REGISTRY/${{ env.ECR_REPOSITORY }}:latest"

      sudo docker stop ${{ env.CONTAINER_NAME }} || true
      sudo docker rm ${{ env.CONTAINER_NAME }} || true

      sudo docker run -d \
        --name ${{ env.CONTAINER_NAME }} \
        -p 80:80 \
        "$IMAGE"
