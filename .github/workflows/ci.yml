name: Build, Push to ECR & Run on Ubuntu EC2 (Manual)

on:
  workflow_dispatch:

env:
  AWS_REGION:      ${{ secrets.AWS_REGION }}
  ECR_REPOSITORY:  ${{ secrets.ECR_REPOSITORY }}
  ACCOUNT_ID:      ${{ secrets.AWS_ACCOUNT_ID }}
  CONTAINER_NAME:  myapp
  CONTAINER_PORT:  "8080"
  HOST_PORT:       "80"

jobs:
  build-push-run:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure Docker is installed (Ubuntu 24.04 LTS)
        shell: bash
        run: |
          set -euxo pipefail
          if ! command -v docker >/dev/null 2>&1; then
            sudo apt-get update -y
            sudo apt-get install -y docker.io
            sudo systemctl enable --now docker
            # Allow runner user to use docker without sudo (may require runner restart once)
            sudo usermod -aG docker "$USER" || true
          else
            echo "Docker already installed"
            sudo systemctl enable --now docker
          fi

      - name: Build & Push Image to ECR
        working-directory: app    # change/remove if your Dockerfile isn't in ./app
        run: |
          set -euxo pipefail
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
          TAG="${GITHUB_SHA::7}"

          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" .
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"

          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      - name: Run Container on this EC2
        run: |
          set -euxo pipefail

          # ECR login (token lasts ~12 hours)
          aws ecr get-login-password --region "$AWS_REGION" \
            | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"

          # Stop & remove any previous container
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

          # Prefer running the immutable SHA tag (safer)
