name: Build & Push to ECR + Deploy via SSM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CONTAINER_NAME: myapp
  CONTAINER_PORT: "8080"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4


      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-ecr-ssm
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Image
        run: |
          set -euxo pipefail
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
          TAG="${GITHUB_SHA::7}"
          docker build -f app/Dockerfile -t "$IMAGE:$TAG" -t "$IMAGE:latest" app
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG"     >> $GITHUB_ENV

    
      - name: Deploy via SSM
        run: |
          set -euxo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=app-ec2" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          COMMAND=$(cat <<'EOS'
          #!/bin/bash
          set -euxo pipefail
          REGION="${AWS_REGION}"
          ACCOUNT_ID="${ACCOUNT_ID}"
          REPO="${ECR_REPOSITORY}"
          TAG="${TAG}"
          CONTAINER_NAME="${CONTAINER_NAME}"
          APP_PORT="${CONTAINER_PORT}"

          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"

          docker rm -f "$CONTAINER_NAME" || true
          docker pull "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO:$TAG"
          docker run -d --name "$CONTAINER_NAME" --restart unless-stopped \
            -p 8080:8080 \
            "$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO:$TAG"
          EOS
          )

          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$COMMAND" \
            --comment "Deploy $TAG to $INSTANCE_ID" \
            --query "Command.CommandId" --output text
