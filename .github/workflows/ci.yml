name: Build & Deploy to EC2 (via SSM)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CONTAINER_NAME: myapp
  APP_PORT: "8080"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # OIDC authentication (NO static keys)
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Build & push Docker image
      - name: Build & Push
        run: |
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
          TAG="${GITHUB_SHA::7}"
          docker build -t "$IMAGE:$TAG" -t "$IMAGE:latest" app
          docker push "$IMAGE:$TAG"
          docker push "$IMAGE:latest"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG" >> $GITHUB_ENV

      # DEPLOY TO EC2 via SSM
      - name: Deploy to Private EC2 via SSM
        run: |
          # Find EC2 instance by Name tag
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=app-ec2" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          DEPLOY_SCRIPT=$(cat << 'EOF'
          #!/bin/bash
          set -euxo pipefail
          IMAGE="${IMAGE}"
          TAG="${TAG}"
          APP_PORT="${APP_PORT}"
          CONTAINER_NAME="${CONTAINER_NAME}"
          REGION="${AWS_REGION}"

          # Authenticate EC2 to ECR
          aws ecr get-login-password --region "$REGION" \
            | docker login --username AWS --password-stdin "$IMAGE"

          docker rm -f "$CONTAINER_NAME" || true
          docker pull "$IMAGE:$TAG"

          docker run -d --name "$CONTAINER_NAME" \
            -p ${APP_PORT}:${APP_PORT} \
            --restart unless-stopped \
            "$IMAGE:$TAG"
          EOF
          )

         
          aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="$DEPLOY_SCRIPT"
