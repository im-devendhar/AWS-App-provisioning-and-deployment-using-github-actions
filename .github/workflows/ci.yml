name: Build & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION:     ${{ secrets.AWS_REGION }}
  ACCOUNT_ID:     ${{ secrets.AWS_ACCOUNT_ID }}
  ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
  CONTAINER_NAME: myapp
  APP_PORT: "8080"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: AWS Auth (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-oidc-role
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (SHA only)
        run: |
          set -euo pipefail
          IMAGE="$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY"
          TAG="${GITHUB_SHA::7}"
          docker build -t "$IMAGE:$TAG" app
          docker push "$IMAGE:$TAG"
          echo "IMAGE=$IMAGE" >> $GITHUB_ENV
          echo "TAG=$TAG"     >> $GITHUB_ENV

      - name: Deploy to EC2 via SSM
        run: |
          set -euo pipefail
          sudo apt-get update -y && sudo apt-get install -y jq

          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=app-ec2" "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" --output text)

          [ -n "$INSTANCE_ID" ] && [ "$INSTANCE_ID" != "None" ] || { echo "No running EC2 with tag Name=app-ec2"; exit 1; }

          SCRIPT=$(cat << 'EOF'
          REGION="${AWS_REGION}"
          ACCOUNT_ID="${ACCOUNT_ID}"
          REPO="${ECR_REPOSITORY}"
          TAG="${TAG}"
          CN="${CONTAINER_NAME}"
          PORT="${APP_PORT}"

          IMAGE="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$REPO:$TAG"
          REGISTRY="$ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com"

          aws ecr get-login-password --region "$REGION" | docker login --username AWS --password-stdin "$REGISTRY"
          docker rm -f "$CN" || true
          docker pull "$IMAGE"
          docker run -d --name "$CN" -p ${PORT}:80 --restart unless-stopped "$IMAGE"
          EOF
          )

          PARAMS=$(printf '%s' "$SCRIPT" | jq -Rs '{commands:[.]}')

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$PARAMS" \
            --query "Command.CommandId" --output text)

          # Optional: wait and print basic output for quick visibility
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query 'StandardOutputContent' --output text || true
